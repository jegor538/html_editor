<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>brutal editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            border-bottom: 2px solid #0f0;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
        }

        .toolbar button {
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            padding: 6px 12px;
            cursor: pointer;
        }

        .toolbar button:active {
            background: #0f0;
            color: #000;
        }

        .status {
            font-size: 10px;
            padding: 4px 12px;
            background: #0f0;
            color: #000;
            border-bottom: 1px solid #0f0;
            flex-shrink: 0;
            font-family: monospace;
        }

        .workspace {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #0f0;
            min-width: 0;
        }

        .preview-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: #fff;
        }

        .pane-label {
            padding: 6px 12px;
            font-weight: bold;
            font-size: 10px;
            border-bottom: 1px solid #0f0;
            background: #000;
            color: #0f0;
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
            border: none;
            padding: 10px;
            resize: none;
            outline: none;
            width: 100%;
        }

        .preview-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        @media (max-width: 640px) {
            .workspace {
                flex-direction: column;
            }
            .editor-pane {
                border-right: none;
                border-bottom: 2px solid #0f0;
                min-height: 45%;
            }
            textarea {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button id="reset">RESET</button>
    <button id="clear">CLEAR</button>
    <button id="copy">COPY</button>
</div>
<div class="status" id="status">● live editing</div>

<div class="workspace">
    <div class="editor-pane">
        <div class="pane-label">[ CODE ]</div>
        <textarea id="code" spellcheck="false"></textarea>
    </div>
    <div class="preview-pane">
        <div class="pane-label">[ PREVIEW ]</div>
        <iframe id="preview" class="preview-frame"></iframe>
    </div>
</div>

<script>
    const code = document.getElementById('code');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');

    const defaultCode = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    background: #0a0a0a;
    color: #0f0;
    font-family: monospace;
    padding: 2rem;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.box {
    border: 2px solid #0f0;
    padding: 2rem;
    max-width: 90%;
    text-align: center;
}
button {
    background: #000;
    border: 1px solid #0f0;
    color: #0f0;
    font-family: monospace;
    padding: 8px 16px;
    margin-top: 1rem;
    cursor: pointer;
}
button:active {
    background: #0f0;
    color: #000;
}
input {
    background: #000;
    border: 1px solid #0f0;
    color: #0f0;
    font-family: monospace;
    padding: 6px;
    margin: 8px 0;
}
</style>
</head>
<body>
<div class="box">
    <h1>brutal editor</h1>
    <p>edit left → preview right</p>
    <input type="text" placeholder="type here" id="input">
    <button onclick="alert('works')">click</button>
    <p id="output"></p>
</div>
<script>
document.getElementById('input')?.addEventListener('input', (e) => {
    document.getElementById('output').innerText = e.target.value;
});
<\/script>
</body>
</html>`;

    function updatePreview() {
        let html = code.value;
        if (!html.trim()) {
            html = '<html><body style="background:#000;color:#0f0;font-family:monospace;padding:20px;">empty</body></html>';
        }
        
        const iframeDoc = preview.contentDocument || preview.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(html);
        iframeDoc.close();
        
        const len = html.length;
        status.innerHTML = `● updated ${new Date().toLocaleTimeString()} | ${len} chars`;
    }

    let timer;
    function schedule() {
        clearTimeout(timer);
        timer = setTimeout(updatePreview, 20);
    }

    code.addEventListener('input', schedule);
    
    document.getElementById('reset').onclick = () => {
        code.value = defaultCode;
        updatePreview();
        status.innerHTML = '● reset to default';
    };
    
    document.getElementById('clear').onclick = () => {
        code.value = '';
        updatePreview();
        status.innerHTML = '● cleared';
    };
    
    document.getElementById('copy').onclick = async () => {
        try {
            await navigator.clipboard.writeText(code.value);
            status.innerHTML = '● copied';
            setTimeout(() => { status.innerHTML = '● live editing'; }, 1500);
        } catch(e) {
            code.select();
            document.execCommand('copy');
            status.innerHTML = '● copied (fallback)';
        }
    };
    
    // load saved or default
    const saved = localStorage.getItem('brutal_code');
    if (saved && saved.length > 20) {
        code.value = saved;
    } else {
        code.value = defaultCode;
    }
    updatePreview();
    
    // autosave
    let saveTimer;
    code.addEventListener('input', () => {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
            localStorage.setItem('brutal_code', code.value);
        }, 1000);
    });
</script>
</body>
</html>
